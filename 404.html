<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- TODO: Add when published on App Store:
  <meta name="apple-itunes-app" content="app-id=XXXXXXX, app-argument=boxlabel://box/UUID">
  -->
  <title>Open in BoxLabel</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="is-404">

  <div class="card">

    <div class="icon-wrap">
      <img src="/app_icon.png" alt="BoxLabel app icon">
    </div>

    <div class="brand">BoxLabel</div>
    <h1>Open Box in App</h1>
    <p class="subtitle">
      Tap below to view your box details in the BoxLabel app.
      Don't have it yet? Download BoxLabel to start organizing your storage.
    </p>

    <button class="btn-primary" id="openBtn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M8.5 7l4 3-4 3V7Z" fill="#fff"/>
        <path d="M10 2C5.58 2 2 5.58 2 10s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8Zm0 14.4A6.4 6.4 0 1 1 10 3.6a6.4 6.4 0 0 1 0 12.8Z" fill="rgba(255,255,255,0.75)"/>
      </svg>
      Open in BoxLabel App
    </button>

    <div class="divider">or</div>

    <div class="store-wrap">
      <div class="btn-store">
        <svg width="22" height="26" viewBox="0 0 22 26" fill="none" aria-hidden="true">
          <path d="M18.07 13.77c-.03-3.14 2.56-4.65 2.68-4.73-1.46-2.14-3.74-2.43-4.55-2.46-1.93-.2-3.78 1.14-4.76 1.14-.99 0-2.51-1.12-4.13-1.09-2.12.03-4.08 1.24-5.17 3.12-2.21 3.84-.57 9.53 1.59 12.65 1.06 1.53 2.32 3.24 3.97 3.18 1.6-.07 2.2-1.03 4.13-1.03 1.91 0 2.47 1.03 4.15.99 1.72-.03 2.8-1.55 3.85-3.08a13.5 13.5 0 0 0 1.75-3.57c-.04-.01-3.46-1.33-3.51-5.12Z" fill="white"/>
          <path d="M14.93 4.38c.88-1.07 1.47-2.55 1.31-4.03-1.27.05-2.8.85-3.71 1.91-.81.93-1.53 2.43-1.34 3.87 1.42.11 2.87-.72 3.74-1.75Z" fill="white"/>
        </svg>
        <div class="store-text">
          <span class="store-sub">Download on the</span>
          <span class="store-main">App Store</span>
        </div>
      </div>
      <div class="coming-soon">Coming soon!</div>
    </div>

  </div>

  <footer>
    <a href="https://boxlabel.app">boxlabel.app</a>
    &nbsp;·&nbsp;
    <a href="/legal_notice.html">Legal Notice</a>
    &nbsp;·&nbsp;
    <a href="/privacy.html">Privacy Statement</a>
  </footer>

  <script>
    (function () {
      /* ── Deep link ── */
      var parts = window.location.pathname.split('/').filter(Boolean);
      var boxIndex = parts.indexOf('box');
      var uuid = boxIndex !== -1 ? parts[boxIndex + 1] || '' : '';

      var deepLink = uuid ? 'boxlabel://box/' + uuid : 'boxlabel://';

      document.getElementById('openBtn').addEventListener('click', function () {
        window.location.href = deepLink;
      });

      /* ── German localisation ── */
      if (navigator.language && navigator.language.toLowerCase().startsWith('de')) {
        document.documentElement.lang = 'de';
        document.title = 'In BoxLabel öffnen';
        document.querySelector('.card h1').textContent = 'Kiste in der App öffnen';
        document.querySelector('.card .subtitle').textContent =
          'Tippe unten, um die Details deiner Kiste in der BoxLabel App anzuzeigen. ' +
          'Noch nicht installiert? Lade BoxLabel herunter, um dein Lager zu organisieren.';
        document.getElementById('openBtn').innerHTML =
          '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
          '<path d="M8.5 7l4 3-4 3V7Z" fill="#fff"/>' +
          '<path d="M10 2C5.58 2 2 5.58 2 10s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8Zm0 14.4A6.4 6.4 0 1 1 10 3.6a6.4 6.4 0 0 1 0 12.8Z" fill="rgba(255,255,255,0.75)"/>' +
          '</svg> In der BoxLabel App öffnen';
        document.querySelector('.divider').textContent = 'oder';
        document.querySelector('.store-text .store-sub').textContent = 'Laden im';
        document.querySelector('.coming-soon').textContent = 'Demnächst!';
        var legalLink = document.querySelector('footer a[href="/legal_notice.html"]');
        legalLink.href = '/impressum.html';
        legalLink.textContent = 'Impressum';
        var privacyLink = document.querySelector('footer a[href="/privacy.html"]');
        privacyLink.href = '/de/datenschutz.html';
        privacyLink.textContent = 'Datenschutz';
      }
    }());
  </script>

</body>
</html>
